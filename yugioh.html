<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pure JS CSV Tool</title>
<style>
table { border-collapse: collapse; }
th, td { border: 1px solid #ccc; padding: 4px; }
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".csv">
<br><br>

검색: <input type="text" id="searchInput">
<button onclick="applySearch()">검색</button>

<br><br>

<div>
<button onclick="prevPage()">이전</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">다음</button>
</div>

<br>

<table id="dataTable"></table>

<br>
<button onclick="downloadSelected()">체크된 데이터 다운로드</button>

<script>

let originalData = [];
let filteredData = [];

let currentPage = 1;
const pageSize = 100;

document.getElementById("fileInput").addEventListener("change", function(e) {

    const file = e.target.files[0];
    const reader = new FileReader();
    reader.readAsText(file, "utf-8");
    reader.onload = function(event) {
        const text = event.target.result;
        parseCSV(text);
        currentPage = 1;
        renderPage();
    };
});

function parseCSV(text) {

    const lines = text.trim().split("\n");
    const headers = lines[0].split(",");

    originalData = lines.slice(1).map(line => {

        const values = line.split(",");
        let obj = {};

        headers.forEach((header, index) => {
            obj[header.trim()] = values[index]?.trim() || "";
        });

        obj._selected = false;
        obj._number = "";

        return obj;
    });

    filteredData = [...originalData];
}

function applySearch() {

    const keyword = document.getElementById("searchInput").value;

    filteredData = originalData.filter(row => {

        // _ 로 시작하지 않는 컬럼만 체크
        return Object.keys(row)
            .filter(key => key[0] !== "_")
            .some(key => String(row[key]).includes(keyword));
    });

    currentPage = 1;
    renderPage();
}

function renderPage() {

    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;

    const pageData = filteredData.slice(start, end);

    renderTable(pageData);

    const totalPages = Math.ceil(filteredData.length / pageSize);
    document.getElementById("pageInfo").innerText =
        `Page ${currentPage} / ${totalPages}`;
}

function renderTable(data) {

    const table = document.getElementById("dataTable");
    table.innerHTML = "";

    if (data.length === 0) return;

    const headers = Object.keys(data[0]).filter(h => !h.startsWith("_"));

    const headerRow = document.createElement("tr");
    headerRow.innerHTML = "<th>선택</th>";

    headers.forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        headerRow.appendChild(th);
    });

    const thNum = document.createElement("th");
    thNum.textContent = "숫자 입력";
    headerRow.appendChild(thNum);

    table.appendChild(headerRow);

    data.forEach(row => {

        const tr = document.createElement("tr");

        const tdCheck = document.createElement("td");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = row._selected;

        checkbox.onchange = () => row._selected = checkbox.checked;

        tdCheck.appendChild(checkbox);
        tr.appendChild(tdCheck);

        headers.forEach(h => {
            const td = document.createElement("td");
            td.textContent = row[h];
            tr.appendChild(td);
        });

        const tdNum = document.createElement("td");
        const input = document.createElement("input");
        input.type = "number";
        input.value = row._number;

        input.oninput = () => row._number = input.value;

        tdNum.appendChild(input);
        tr.appendChild(tdNum);

        table.appendChild(tr);
    });
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        renderPage();
    }
}

function nextPage() {
    const totalPages = Math.ceil(filteredData.length / pageSize);
    if (currentPage < totalPages) {
        currentPage++;
        renderPage();
    }
}

function downloadSelected() {

    const selected = originalData.filter(row => row._selected);

    if (selected.length === 0) {
        alert("선택된 데이터가 없습니다.");
        return;
    }

    const headers = Object.keys(selected[0]).filter(h => !h.startsWith("_"));

    let csv = headers.join(",") + ",보유수\n";

    selected.forEach(row => {

        const line = headers.map(h => row[h]).join(",");
        csv += line + "," + row._number + "\n";
    });

    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "selected_data.csv";
    link.click();
}

</script>

</body>
</html>
